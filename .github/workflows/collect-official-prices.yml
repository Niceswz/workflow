name: Collect Official Prices

on:
  schedule:
    # 与历史官方价 UTC 调度保持同频：每日汇率刷新、每周全量刷新。
    - cron: "10 18 * * *"
    - cron: "30 18 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "official price collection mode"
        required: false
        default: "fx_only"
        type: choice
        options:
          - fx_only
          - weekly_full

concurrency:
  group: collect-official-prices
  cancel-in-progress: false

jobs:
  direct-collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Collect and write official prices
        env:
          REQUESTED_MODE: ${{ github.event.inputs.mode }}
          SCHEDULE: ${{ github.event.schedule }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "缺少 NEXT_PUBLIC_SUPABASE_URL 或 SUPABASE_SERVICE_ROLE_KEY secret"
            exit 1
          fi

          MODE="${REQUESTED_MODE:-fx_only}"
          if [ "$SCHEDULE" = "30 18 * * 0" ]; then
            MODE="weekly_full"
          fi

          if [ "$MODE" = "fx_only" ]; then
            npm run collect:official -- --fx-only --post --mode=worker
          else
            npm run collect:official -- --all --post --mode=worker
          fi

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          const payload = {
            title: "PriceAI GitHub Actions 失败",
            message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
            severity: "warning",
            source: "github-actions",
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          };

          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          NODE
